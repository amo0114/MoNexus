# Production stack for MoNexus.
#
# Usage:
#   cp .env.example .env       # fill in real secrets
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Local development still uses the simpler docker-compose.yml (postgres only).

services:
  postgres:
    image: postgres:16-alpine
    container_name: monexus-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - monexus

  server:
    build:
      context: ./server
      target: runtime
    container_name: monexus-server-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (>=32 chars)}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?FRONTEND_ORIGIN is required}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      USER_STATUS_CACHE_TTL_SEC: ${USER_STATUS_CACHE_TTL_SEC:-60}
      # Object storage (P0-C). When running with --profile selfhost-storage,
      # the stack ships its own MinIO; otherwise the operator points
      # STORAGE_ENDPOINT at AWS S3, R2, OSS, etc. The server's config
      # validator will refuse to boot in production if any of the four
      # core values is missing.
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:?STORAGE_ENDPOINT is required}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:?STORAGE_BUCKET is required}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:?STORAGE_ACCESS_KEY is required}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:?STORAGE_SECRET_KEY is required}
      STORAGE_PUBLIC_URL_BASE: ${STORAGE_PUBLIC_URL_BASE:-}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - monexus

  # Self-hosted S3-compatible storage. Skip this if you point
  # STORAGE_ENDPOINT at an external provider (AWS S3 / R2 / OSS / etc.)
  # by leaving the `selfhost-storage` profile unset.
  minio:
    image: minio/minio:latest
    container_name: monexus-minio-prod
    restart: unless-stopped
    profiles: [selfhost-storage]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    volumes:
      - miniodata-prod:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monexus

  minio-init:
    image: minio/mc:latest
    profiles: [selfhost-storage]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${STORAGE_ACCESS_KEY} ${STORAGE_SECRET_KEY} &&
      mc mb --ignore-existing local/${STORAGE_BUCKET} &&
      mc anonymous set download local/${STORAGE_BUCKET}
      "
    networks:
      - monexus

  # Local/staging-only SMTP capture service. Do not enable this profile for
  # real production SMTP; point SMTP_HOST at the provider instead.
  mailpit:
    image: axllent/mailpit:latest
    container_name: monexus-mailpit-staging
    restart: unless-stopped
    profiles: [staging-mail]
    ports:
      - "${MAILPIT_WEB_PORT:-18082}:8025"
    networks:
      - monexus

  web:
    build:
      context: .
      target: runtime
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    container_name: monexus-web-prod
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - monexus

volumes:
  pgdata-prod:
  miniodata-prod:

networks:
  monexus:
    driver: bridge
