<!--
  MoNexus Coin — brand asset
  Source-of-truth SVG for the decorative MoNexus coin mark. The React
  component at src/components/ui/CoinIcon.tsx mirrors this file inline
  for UI use (Profile hero watermark, etc.). When updating one, keep
  the other in sync.

  Differences from the original draft:
  - Brand: "MOYUAN COIN" -> "MONEXUS COIN".
  - Dropped the cavityInset filter (its <feInnerShadow> is not a real
    SVG primitive and was silently ignored by browsers); the affected
    inner ring uses a flat dark stroke instead.
  - Cleaned up duplicate id references; otherwise the visual recipe is
    the same: radial baseMetal, edgeGlow, shinyGold, deepShadow,
    heavyEmboss filter, guilloché sunburst, MONEXUS architectural mark,
    2026 mint mark.
-->
<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <radialGradient id="baseMetal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEDB0" />
      <stop offset="30%" stop-color="#DFB957" />
      <stop offset="50%" stop-color="#B28C34" />
      <stop offset="70%" stop-color="#EAD186" />
      <stop offset="90%" stop-color="#8E6A21" />
      <stop offset="100%" stop-color="#4C350A" />
    </radialGradient>

    <linearGradient id="edgeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="30%" stop-color="#FFDC73" stop-opacity="0.3" />
      <stop offset="70%" stop-color="#AA7B25" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#FFEBA3" stop-opacity="0.8" />
    </linearGradient>

    <linearGradient id="shinyGold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FFF5CC" />
      <stop offset="40%" stop-color="#E8C359" />
      <stop offset="60%" stop-color="#BD9026" />
      <stop offset="100%" stop-color="#FFDD7A" />
    </linearGradient>

    <linearGradient id="deepShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A2807" />
      <stop offset="100%" stop-color="#7B5B16" />
    </linearGradient>

    <filter id="heavyEmboss" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#1A1100" flood-opacity="0.75" />
      <feDropShadow dx="-1.5" dy="-1.5" stdDeviation="1" flood-color="#FFF0BA" flood-opacity="0.5" />
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <path id="textTop" d="M 110, 400 A 290, 290 0 0, 1 690, 400" />
    <path id="textBot" d="M 690, 400 A 290, 290 0 0, 1 110, 400" />
  </defs>

  <g>
    <circle cx="400" cy="405" r="380" fill="#000" opacity="0.6" filter="blur(8px)" />
    <circle cx="400" cy="400" r="380" fill="url(#baseMetal)" />
    <circle cx="400" cy="400" r="378" fill="none" stroke="url(#edgeGlow)" stroke-width="4" filter="url(#glow)" />

    <circle cx="400" cy="400" r="360" fill="none" stroke="url(#deepShadow)" stroke-width="32" stroke-dasharray="8 12" />
    <circle cx="400" cy="400" r="360" fill="none" stroke="url(#shinyGold)" stroke-width="32" stroke-dasharray="8 12" transform="rotate(0.5 400 400)" />

    <circle cx="400" cy="400" r="340" fill="none" stroke="#2B1D04" stroke-width="12" opacity="0.85" />
    <circle cx="400" cy="400" r="338" fill="none" stroke="url(#edgeGlow)" stroke-width="2" opacity="0.6" />

    <g opacity="0.12">
      <circle cx="400" cy="400" r="230" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="1 3" />
      <circle cx="400" cy="400" r="220" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="4 6" />
      <circle cx="400" cy="400" r="210" fill="none" stroke="#000" stroke-width="0.5" stroke-dasharray="1 1" />
      <circle cx="400" cy="400" r="100" fill="none" stroke="#000" stroke-width="240" stroke-dasharray="0.5 3" />
    </g>
    <g opacity="0.2">
      <circle cx="400" cy="400" r="100" fill="none" stroke="#FFF" stroke-width="240" stroke-dasharray="0.5 3" transform="rotate(0.2 400 400)" />
    </g>

    <circle cx="400" cy="400" r="245" fill="none" stroke="url(#shinyGold)" stroke-width="8" filter="url(#heavyEmboss)" />
    <circle cx="400" cy="400" r="255" fill="none" stroke="url(#deepShadow)" stroke-width="3" opacity="0.6" />

    <text fill="url(#shinyGold)" font-size="68" font-family="'Trajan Pro', 'Cinzel', 'Times New Roman', serif" font-weight="900" letter-spacing="12" filter="url(#heavyEmboss)">
      <textPath href="#textTop" startOffset="50%" text-anchor="middle">MONEXUS COIN</textPath>
    </text>

    <text fill="url(#shinyGold)" font-size="42" font-family="'Trajan Pro', 'Cinzel', 'Times New Roman', serif" font-weight="600" letter-spacing="18" opacity="0.9" filter="url(#heavyEmboss)">
      <textPath href="#textBot" startOffset="50%" text-anchor="middle">DIGITAL RESERVE</textPath>
    </text>

    <g fill="url(#shinyGold)" filter="url(#heavyEmboss)">
      <path d="M 100, 400 L 115, 385 L 130, 400 L 115, 415 Z" />
      <path d="M 670, 400 L 685, 385 L 700, 400 L 685, 415 Z" />
      <line x1="115" y1="385" x2="115" y2="415" stroke="#FFF" stroke-width="1.5" opacity="0.5" />
      <line x1="100" y1="400" x2="130" y2="400" stroke="#FFF" stroke-width="1.5" opacity="0.5" />
      <line x1="685" y1="385" x2="685" y2="415" stroke="#FFF" stroke-width="1.5" opacity="0.5" />
      <line x1="670" y1="400" x2="700" y2="400" stroke="#FFF" stroke-width="1.5" opacity="0.5" />
    </g>

    <g stroke="url(#shinyGold)" stroke-width="10" stroke-linecap="round" filter="url(#heavyEmboss)" opacity="0.8">
      <line x1="340" y1="210" x2="340" y2="280" />
      <circle cx="340" cy="210" r="5" fill="url(#shinyGold)" stroke="none" />
      <line x1="340" y1="460" x2="340" y2="590" />
      <circle cx="340" cy="590" r="5" fill="url(#shinyGold)" stroke="none" />

      <line x1="460" y1="210" x2="460" y2="280" />
      <circle cx="460" cy="210" r="5" fill="url(#shinyGold)" stroke="none" />
      <line x1="460" y1="460" x2="460" y2="590" />
      <circle cx="460" cy="590" r="5" fill="url(#shinyGold)" stroke="none" />
    </g>

    <g filter="url(#heavyEmboss)">
      <path d="M 220 530 L 250 220 L 300 220 L 400 380 L 500 220 L 550 220 L 580 530 L 515 530 L 495 310 L 400 460 L 305 310 L 285 530 Z"
            fill="url(#deepShadow)" transform="translate(0, 6)" />
      <path d="M 220 530 L 250 220 L 300 220 L 400 380 L 500 220 L 550 220 L 580 530 L 515 530 L 495 310 L 400 460 L 305 310 L 285 530 Z"
            fill="url(#shinyGold)" />
      <path d="M 300 220 L 400 380 L 305 310 Z" fill="#FFF5CC" opacity="0.4" />
      <path d="M 550 220 L 580 530 L 515 530 L 495 310 Z" fill="#FFF5CC" opacity="0.3" />
      <path d="M 220 530 L 250 220 L 300 220 L 285 530 Z" fill="#7B5B16" opacity="0.4" />
      <path d="M 400 380 L 500 220 L 495 310 Z" fill="#7B5B16" opacity="0.5" />
      <path d="M 300 220 L 400 380 L 500 220" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round" opacity="0.5" />
      <path d="M 400 460 L 400 380" fill="none" stroke="#7B5B16" stroke-width="4" opacity="0.7" />
    </g>

    <g filter="url(#heavyEmboss)">
      <rect x="360" y="635" width="80" height="26" rx="4" fill="url(#deepShadow)" opacity="0.8" />
      <rect x="361" y="636" width="78" height="24" rx="3" fill="none" stroke="url(#shinyGold)" stroke-width="1" opacity="0.6" />
      <text x="400" y="654" fill="url(#shinyGold)" font-size="16" font-family="'Trajan Pro', 'Cinzel', 'Arial', sans-serif" font-weight="bold" text-anchor="middle" letter-spacing="4">
        2026
      </text>
    </g>
  </g>
</svg>
