name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: monexus
          POSTGRES_PASSWORD: monexus_dev_2026
          POSTGRES_DB: monexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U monexus -d monexus_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://monexus:monexus_dev_2026@localhost:5432/monexus_test?schema=public
      TEST_DATABASE_URL: postgresql://monexus:monexus_dev_2026@localhost:5432/monexus_test?schema=public
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-xx
      FRONTEND_ORIGIN: http://localhost:5173

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix server ci

      - name: Generate Prisma client
        run: npm --prefix server run db:generate

      - name: Apply database migrations
        run: npm --prefix server run db:migrate:deploy
        env:
          DATABASE_URL: postgresql://monexus:monexus_dev_2026@localhost:5432/monexus_test?schema=public

      - name: Build backend
        run: npm --prefix server run build

      - name: Test backend
        run: npm --prefix server test
        env:
          TEST_DATABASE_URL: postgresql://monexus:monexus_dev_2026@localhost:5432/monexus_test?schema=public
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-xx
          FRONTEND_ORIGIN: http://localhost:5173

      - name: Build frontend
        run: npm run build

  e2e:
    name: Playwright E2E
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: monexus
          POSTGRES_PASSWORD: monexus_dev_2026
          POSTGRES_DB: monexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U monexus -d monexus_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://monexus:monexus_dev_2026@localhost:5432/monexus_test?schema=public
      TEST_DATABASE_URL: postgresql://monexus:monexus_dev_2026@localhost:5432/monexus_test?schema=public
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-xx
      FRONTEND_ORIGIN: http://localhost:5173
      API_RATE_LIMIT_MAX: 3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix server ci

      - name: Generate Prisma client
        run: npm --prefix server run db:generate

      - name: Apply database migrations
        run: npm --prefix server run db:migrate:deploy

      - name: Seed E2E fixtures
        run: npm --prefix server run db:seed:force

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Build backend
        run: npm --prefix server run build

      - name: Start backend
        run: npm --prefix server run dev &
        env:
          DATABASE_URL: postgresql://monexus:monexus_dev_2026@localhost:5432/monexus_test?schema=public
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-xx
          FRONTEND_ORIGIN: http://localhost:5173
          PORT: 3000

      - name: Start frontend
        run: npm run dev -- --host 127.0.0.1 &

      - name: Wait for servers
        run: |
          for url in http://127.0.0.1:3000/api/health http://127.0.0.1:5173; do
            for i in {1..60}; do
              if curl -fsS "$url" >/dev/null; then
                echo "$url is ready"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "::error::$url did not become ready in time"
                exit 1
              fi
              sleep 1
            done
          done

      - name: Run E2E tests
        run: npm run e2e
        env:
          CI: 'true'
          E2E_BASE_URL: http://127.0.0.1:5173

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
