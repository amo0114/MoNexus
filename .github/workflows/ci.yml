name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: monexus
          POSTGRES_PASSWORD: monexus_dev_2026
          POSTGRES_DB: monexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U monexus -d monexus_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://monexus:monexus_dev_2026@localhost:5432/monexus_test?schema=public
      TEST_DATABASE_URL: postgresql://monexus:monexus_dev_2026@localhost:5432/monexus_test?schema=public
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-xx
      FRONTEND_ORIGIN: http://localhost:5173

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix server ci

      - name: Generate Prisma client
        run: npm --prefix server run db:generate

      - name: Apply database migrations
        run: npm --prefix server run db:migrate:deploy
        env:
          DATABASE_URL: postgresql://monexus:monexus_dev_2026@localhost:5432/monexus_test?schema=public

      - name: Build backend
        run: npm --prefix server run build

      - name: Test backend
        run: npm --prefix server test
        env:
          TEST_DATABASE_URL: postgresql://monexus:monexus_dev_2026@localhost:5432/monexus_test?schema=public
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long-xx
          FRONTEND_ORIGIN: http://localhost:5173

      - name: Build frontend
        run: npm run build
