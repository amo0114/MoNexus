server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Reasonable defaults
  client_max_body_size 10m;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/xml+rss application/atom+xml image/svg+xml;
  gzip_min_length 1024;

  # Hashed asset files (Vite emits content-hashed names) can be cached forever.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API proxy — `server` resolves to the backend container on the
  # compose network. Cookies and Authorization headers pass through
  # unchanged so the cookie-based refresh-token flow keeps working.
  location /api/ {
    proxy_pass http://server:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
  }

  # SPA fallback — any unknown path serves index.html so React Router
  # can handle client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Don't log noisy probes
  location = /favicon.ico { access_log off; log_not_found off; }
  location = /robots.txt  { access_log off; log_not_found off; }
}
