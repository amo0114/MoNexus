services:
  postgres:
    image: postgres:16-alpine
    container_name: monexus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: monexus
      POSTGRES_PASSWORD: monexus_dev_2026
      POSTGRES_DB: monexus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monexus -d monexus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
